<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gospel Eisech Chimism | Portfolio</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <!-- Framer Motion (via CDN is tricky, using CSS transitions for stability in single file) -->

    <style>
        :root {
            --accent: #F27D26;
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .font-display {
            font-family: 'Anton', sans-serif;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        .hero-title {
            font-family: 'Anton', sans-serif;
            font-size: clamp(2.5rem, 12vw, 6rem);
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .meta-label {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
        .border-accent { border-color: var(--accent); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .hero-title {
                font-size: clamp(2.5rem, 12vw, 4rem);
            }
            section {
                padding-left: 1rem;
                padding-right: 1rem;
            }
        }

        .tab-active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }

        input, textarea, select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem;
            border-radius: 0.75rem;
            outline: none;
            width: 100%;
        }

        input:focus, textarea:focus {
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Firebase Initialization ---
        const firebaseConfig = {
            projectId: "gen-lang-client-0163222437",
            appId: "1:110886016178:web:615362c6c77d59498a65ab",
            apiKey: "AIzaSyBOFMgZ4KgaQhL3PVLYP2daB2xAuJjlELM",
            authDomain: "gen-lang-client-0163222437.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0163222437-default-rtdb.firebaseio.com/",
            storageBucket: "gen-lang-client-0163222437.firebasestorage.app",
            messagingSenderId: "110886016178",
            measurementId: ""
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- Telegram Helper ---
        const sendTelegramMessage = async (message, config) => {
            if (!config || !config.botToken || !config.chatId) return;
            const url = `https://api.telegram.org/bot${config.botToken}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: config.chatId,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) {
                console.error("Failed to send Telegram message", e);
            }
        };

        // --- Icons Component ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- Default Data ---
        const DEFAULT_DATA = {
            profile: {
                name: "Gospel Eisech Chimism",
                role: "Web Developer & AI Specialist",
                bio: "Gospel Eisech Chimism | Web Developer & AI Specialist. Building impactful digital experiences with modern tech. Lagos, Nigeria.",
                location: "Lagos, Nigeria",
                specialization: "Web Dev & AI",
                yearsExp: "5+",
                image: "https://picsum.photos/seed/gospel/800/1000",
                email: "hello@gospel.dev",
                promo: "🚀 Special Offer: Get 20% off on your first AI-integrated web project! Use code: GOSPEL2026"
            },
            telegramConfig: {
                botToken: "",
                chatId: ""
            },
            channels: [
                { id: '1', label: 'Join Telegram', url: '#', icon: 'send', color: '#0088cc' },
                { id: '2', label: 'Discord Community', url: '#', icon: 'message-circle', color: '#5865F2' },
                { id: '3', label: 'WhatsApp Group', url: '#', icon: 'phone', color: '#25D366' }
            ],
            stats: [
                { id: '1', val: '50+', label: 'Projects' },
                { id: '2', val: '20k+', label: 'Users' },
                { id: '3', val: '100%', label: 'Success' },
                { id: '4', val: '24/7', label: 'Support' }
            ],
            services: [
                { id: '1', icon: "globe", title: "Web Dev", desc: "High-performance, responsive web apps using React & Next.js." },
                { id: '2', icon: "cpu", title: "AI Integration", desc: "Implementing ML models to enhance user experience." },
                { id: '3', icon: "layers", title: "UI/UX Design", desc: "Intuitive interfaces prioritizing user needs." },
                { id: '4', icon: "code", title: "API Dev", desc: "Robust backend systems and secure data communication." }
            ],
            projects: [
                {
                    id: '1',
                    title: 'AI Vision Engine',
                    description: 'Real-time object detection and classification system.',
                    image: 'https://picsum.photos/seed/ai-vision/800/600',
                    tags: ['AI', 'TensorFlow', 'React'],
                    link: '#'
                },
                {
                    id: '2',
                    title: 'Fintech Dashboard',
                    description: 'Data visualization for financial analytics.',
                    image: 'https://picsum.photos/seed/fintech/800/600',
                    tags: ['Web Dev', 'D3.js', 'Next.js'],
                    link: '#'
                }
            ],
            socials: {
                github: "#",
                linkedin: "#",
                twitter: "#"
            }
        };

        // --- Components ---

        const Navbar = ({ activeTab, setActiveTab, isAdmin, setIsAdmin }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: 'Home', id: 'home' },
                { name: 'About', id: 'about' },
                { name: 'Services', id: 'services' },
                { name: 'Portfolio', id: 'portfolio' },
                { name: 'Reviews', id: 'reviews' },
                { name: 'Contact', id: 'contact' },
            ];

            return (
                <nav className={`fixed top-0 left-0 w-full z-[100] transition-all duration-300 ${scrolled ? 'bg-black/80 backdrop-blur-md py-2' : 'bg-transparent py-4'}`}>
                    <div className="max-w-7xl mx-auto px-4 flex justify-between items-center">
                        <button onClick={() => setActiveTab('home')} className="text-xl font-display uppercase tracking-tighter hover:text-accent transition-colors">Gospel.</button>
                        
                        <div className="hidden md:flex gap-4 items-center">
                            {navLinks.map(link => (
                                <button 
                                    key={link.id} 
                                    onClick={() => { setActiveTab(link.id); setIsAdmin(false); }} 
                                    className={`text-[9px] font-bold uppercase tracking-widest transition-colors ${activeTab === link.id && !isAdmin ? 'text-accent' : 'hover:text-accent'}`}
                                >
                                    {link.name}
                                </button>
                            ))}
                            {isAdmin && (
                                <button onClick={() => setIsAdmin(false)} className="text-[9px] font-bold uppercase tracking-widest text-red-500 hover:text-red-400 transition-colors flex items-center gap-1">
                                    <Icon name="log-out" size={10} /> Logout
                                </button>
                            )}
                        </div>

                        <div className="flex items-center gap-2 md:hidden">
                            {isAdmin && (
                                <button onClick={() => setIsAdmin(false)} className="text-red-500 p-2">
                                    <Icon name="log-out" size={18} />
                                </button>
                            )}
                            <button className="text-white p-2" onClick={() => setIsOpen(!isOpen)}>
                                {isOpen ? <Icon name="x" size={20} /> : <Icon name="menu" size={20} />}
                            </button>
                        </div>
                    </div>

                    {isOpen && (
                        <div className="absolute top-full left-0 w-full bg-black/95 backdrop-blur-xl p-6 flex flex-col gap-4 md:hidden border-b border-white/10 animate-fade-in">
                            {navLinks.map(link => (
                                <button 
                                    key={link.id} 
                                    onClick={() => { setActiveTab(link.id); setIsOpen(false); setIsAdmin(false); }}
                                    className={`text-xl font-display uppercase tracking-tighter text-left ${activeTab === link.id && !isAdmin ? 'text-accent' : ''}`}
                                >
                                    {link.name}
                                </button>
                            ))}
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = ({ data, setActiveTab, onNameClick }) => {
            const [copied, setCopied] = useState(false);
            const copyBio = () => {
                navigator.clipboard.writeText(data.profile.bio);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <section className="min-h-screen flex flex-col justify-center items-center relative overflow-hidden px-4 pt-16">
                    <div className="absolute inset-0 z-0">
                        <div className="absolute top-1/4 left-1/4 w-[200px] h-[200px] bg-accent/10 rounded-full blur-[80px]" />
                        <div className="absolute bottom-1/4 right-1/4 w-[150px] h-[150px] bg-blue-500/5 rounded-full blur-[60px]" />
                    </div>

                    {data.profile.promo && (
                        <div className="relative z-10 mb-6 animate-bounce">
                            <div className="glass px-4 py-1.5 rounded-full border-accent/50 flex items-center gap-2">
                                <Icon name="sparkles" size={12} className="text-accent" />
                                <span className="text-[9px] sm:text-xs font-bold tracking-wide text-accent uppercase">{data.profile.promo}</span>
                            </div>
                        </div>
                    )}

                    <div className="relative z-10 text-center animate-fade-in w-full max-w-4xl">
                        <p className="meta-label mb-3 text-accent text-[10px]">{data.profile.role}</p>
                        <h1 
                            className="hero-title mb-5 cursor-pointer select-none active:scale-95 transition-transform"
                            onClick={onNameClick}
                        >
                            {(data?.profile?.name || "Gospel").split(' ').map((n, i) => <React.Fragment key={i}>{n} <br /></React.Fragment>)}
                        </h1>
                        
                        <div className="flex flex-col gap-4 items-center justify-center mb-8">
                            <button onClick={() => setActiveTab('portfolio')} className="w-full sm:w-auto px-8 py-4 bg-accent text-black font-bold uppercase tracking-widest rounded-full hover:scale-105 transition-transform text-xs shadow-lg shadow-accent/20">
                                Explore Portfolio
                            </button>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 w-full max-w-xl px-4">
                                {data.channels?.map(channel => (
                                    <a 
                                        key={channel.id} 
                                        href={channel.url} 
                                        className="glass p-3 rounded-xl flex items-center justify-center gap-2 hover:bg-white/10 transition-all group"
                                        style={{ borderLeft: `3px solid ${channel.color}` }}
                                    >
                                        <Icon name={channel.icon} size={16} style={{ color: channel.color }} />
                                        <span className="text-[9px] font-bold uppercase tracking-widest">{channel.label}</span>
                                    </a>
                                ))}
                            </div>
                        </div>

                        <div className="flex gap-3 justify-center mb-8">
                            <a href={data.socials.github} className="p-3 glass rounded-full hover:bg-white/10 transition-colors"><Icon name="github" size={18} /></a>
                            <a href={data.socials.linkedin} className="p-3 glass rounded-full hover:bg-white/10 transition-colors"><Icon name="linkedin" size={18} /></a>
                            <a href={data.socials.twitter} className="p-3 glass rounded-full hover:bg-white/10 transition-colors"><Icon name="twitter" size={18} /></a>
                        </div>

                        <div className="glass p-4 rounded-2xl max-w-md mx-auto text-left border-accent/30 relative group">
                            <div className="flex justify-between items-center mb-2">
                                <p className="text-[9px] font-bold uppercase tracking-widest text-accent">Quick Bio</p>
                                <button onClick={copyBio} className="text-accent hover:scale-110 transition-transform bg-accent/10 p-1.5 rounded-lg">
                                    <Icon name={copied ? "check" : "copy"} size={12} />
                                </button>
                            </div>
                            <p className="text-[11px] sm:text-xs text-white/70 leading-relaxed italic">"{data.profile.bio}"</p>
                        </div>
                    </div>
                </section>
            );
        };

        const About = ({ data }) => (
            <section className="py-12 px-4 max-w-7xl mx-auto animate-fade-in">
                <div className="grid md:grid-cols-2 gap-8 items-center">
                    <div className="relative">
                        <div className="aspect-[3/4] rounded-2xl overflow-hidden glass p-1">
                            <img src={data.profile.image} alt={data.profile.name} className="w-full h-full object-cover rounded-xl" referrerPolicy="no-referrer" />
                        </div>
                        <div className="absolute -bottom-2 -right-2 glass p-4 rounded-xl hidden sm:block">
                            <p className="text-2xl font-display text-accent">{data.profile.yearsExp}</p>
                            <p className="text-[8px] uppercase tracking-widest opacity-60">Years Exp.</p>
                        </div>
                    </div>
                    <div>
                        <div className="mb-6">
                            <p className="meta-label text-accent mb-2 text-[10px]">About Me</p>
                            <h2 className="text-3xl md:text-5xl font-display uppercase leading-none mb-3">Visionary Developer</h2>
                        </div>
                        <div className="space-y-4 text-sm text-white/70 leading-relaxed">
                            <p>{data.profile.bio}</p>
                            <div className="grid grid-cols-2 gap-4 pt-2">
                                <div>
                                    <p className="text-white font-bold text-[10px] mb-1 uppercase tracking-wider">Location</p>
                                    <p className="text-xs">{data.profile.location}</p>
                                </div>
                                <div>
                                    <p className="text-white font-bold text-[10px] mb-1 uppercase tracking-wider">Specialization</p>
                                    <p className="text-xs">{data.profile.specialization}</p>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 pt-4">
                                {data.stats?.map((stat) => (
                                    <div key={stat.id} className="glass p-2 rounded-lg text-center">
                                        <p className="text-lg font-display text-accent">{stat.val}</p>
                                        <p className="text-[7px] uppercase tracking-widest opacity-60">{stat.label}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Services = ({ data }) => (
            <section className="py-12 px-4 max-w-7xl mx-auto animate-fade-in">
                <div className="mb-8">
                    <p className="meta-label text-accent mb-2 text-[10px]">Services</p>
                    <h2 className="text-3xl md:text-5xl font-display uppercase leading-none">What I Offer</h2>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    {data.services?.map((s) => (
                        <div key={s.id} className="glass p-5 rounded-xl hover:bg-white/10 transition-all">
                            <div className="mb-3 p-2 bg-black/50 rounded-lg w-fit text-accent">
                                <Icon name={s.icon} size={20} />
                            </div>
                            <h3 className="text-base font-bold mb-1">{s.title}</h3>
                            <p className="text-xs text-white/60 leading-relaxed">{s.desc}</p>
                        </div>
                    ))}
                </div>
            </section>
        );

        const Portfolio = ({ data }) => (
            <section className="py-12 px-4 max-w-7xl mx-auto animate-fade-in">
                <div className="mb-8">
                    <p className="meta-label text-accent mb-2 text-[10px]">Portfolio</p>
                    <h2 className="text-3xl md:text-5xl font-display uppercase leading-none">Featured Work</h2>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    {data.projects?.map((p, i) => (
                        <div key={p.id} className="group">
                            <div className="relative aspect-[4/3] rounded-xl overflow-hidden mb-3 glass">
                                <img src={p.image} alt={p.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" referrerPolicy="no-referrer" />
                                <div className="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                                    <a href={p.link} className="p-2.5 bg-accent text-black rounded-full"><Icon name="external-link" size={16} /></a>
                                    <a href="#" className="p-2.5 glass rounded-full"><Icon name="github" size={16} /></a>
                                </div>
                            </div>
                            <div className="flex gap-1.5 mb-2 flex-wrap">
                                {p.tags?.map(tag => (
                                    <span key={tag} className="text-[7px] font-bold uppercase tracking-widest px-2 py-0.5 glass rounded-full text-accent">{tag}</span>
                                ))}
                            </div>
                            <h3 className="text-lg font-display uppercase mb-0.5">{p.title}</h3>
                            <p className="text-xs text-white/60 line-clamp-2">{p.description}</p>
                        </div>
                    ))}
                </div>
            </section>
        );

        const Reviews = ({ data, reviews, setReviews }) => {
            const [newReview, setNewReview] = useState({ project: data.projects?.[0]?.title || 'General', user: '', rating: 5, comment: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!newReview.user || !newReview.comment) return;
                
                const reviewData = { 
                    ...newReview, 
                    createdAt: firebase.database.ServerValue.TIMESTAMP 
                };

                try {
                    await db.ref('reviews').push(reviewData);
                    
                    // Send Telegram Notification
                    const message = `🌟 <b>New Review Received!</b>\n\n<b>User:</b> ${newReview.user}\n<b>Project:</b> ${newReview.project}\n<b>Rating:</b> ${'⭐'.repeat(newReview.rating)}\n<b>Comment:</b> ${newReview.comment}`;
                    await sendTelegramMessage(message, data.telegramConfig);

                    setNewReview({ ...newReview, user: '', comment: '' });
                } catch (e) {
                    console.error("Error adding review", e);
                    alert("Failed to post review. Please try again.");
                }
            };

            return (
                <section className="py-12 px-4 max-w-7xl mx-auto animate-fade-in">
                    <div className="mb-8">
                        <p className="meta-label text-accent mb-2 text-[10px]">Reviews</p>
                        <h2 className="text-3xl md:text-5xl font-display uppercase leading-none">Project Feedback</h2>
                    </div>
                    <div className="grid lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-1 glass p-5 rounded-2xl h-fit">
                            <h3 className="text-lg font-bold mb-4">Leave a Review</h3>
                            <form onSubmit={handleSubmit} className="space-y-3">
                                <div>
                                    <label className="text-[9px] uppercase font-bold opacity-50 block mb-1">Project</label>
                                    <select className="text-xs p-2" value={newReview.project} onChange={e => setNewReview({...newReview, project: e.target.value})}>
                                        {data.projects?.map(p => <option key={p.id} value={p.title}>{p.title}</option>)}
                                        <option value="General">General Inquiry</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="text-[9px] uppercase font-bold opacity-50 block mb-1">Your Name</label>
                                    <input className="text-xs p-2" type="text" value={newReview.user} onChange={e => setNewReview({...newReview, user: e.target.value})} placeholder="Your name" />
                                </div>
                                <div>
                                    <label className="text-[9px] uppercase font-bold opacity-50 block mb-1">Rating</label>
                                    <div className="flex gap-1">
                                        {[1,2,3,4,5].map(num => (
                                            <button key={num} type="button" onClick={() => setNewReview({...newReview, rating: num})} className={`p-1 transition-colors ${newReview.rating >= num ? 'text-accent' : 'text-white/10'}`}>
                                                <Icon name="star" size={16} />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-[9px] uppercase font-bold opacity-50 block mb-1">Comment</label>
                                    <textarea className="text-xs p-2" value={newReview.comment} onChange={e => setNewReview({...newReview, comment: e.target.value})} placeholder="What do you think?" rows="3" />
                                </div>
                                <button type="submit" className="w-full py-3 bg-accent text-black font-bold uppercase tracking-widest rounded-xl text-[10px] hover:scale-105 transition-transform">Post Review</button>
                            </form>
                        </div>
                        <div className="lg:col-span-2 space-y-3 max-h-[500px] overflow-y-auto pr-2">
                            {reviews.map(r => (
                                <div key={r.id} className="glass p-4 rounded-xl">
                                    <div className="flex justify-between items-start mb-1.5">
                                        <div>
                                            <p className="text-accent text-[8px] font-bold uppercase tracking-widest mb-0.5">{r.project}</p>
                                            <h4 className="text-sm font-bold">{r.user}</h4>
                                        </div>
                                        <div className="flex text-accent">
                                            {[...Array(r.rating)].map((_, i) => <Icon key={i} name="star" size={10} />)}
                                        </div>
                                    </div>
                                    <p className="text-xs text-white/60 italic leading-relaxed">"{r.comment}"</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Contact = ({ data }) => {
            const [status, setStatus] = useState('idle');
            const [copied, setCopied] = useState(false);
            const [formData, setFormData] = useState({ name: '', email: '', message: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                setStatus('submitting');
                
                try {
                    await db.ref('contacts').push({
                        ...formData,
                        createdAt: firebase.database.ServerValue.TIMESTAMP
                    });

                    // Send Telegram Notification
                    const message = `📩 <b>New Contact Form Submission!</b>\n\n<b>Name:</b> ${formData.name}\n<b>Email:</b> ${formData.email}\n<b>Message:</b> ${formData.message}`;
                    await sendTelegramMessage(message, data.telegramConfig);

                    setStatus('success');
                    setFormData({ name: '', email: '', message: '' });
                } catch (e) {
                    console.error("Error submitting contact form", e);
                    setStatus('error');
                }
            };

            const copyEmail = () => {
                navigator.clipboard.writeText(data.profile.email);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <section className="py-12 px-4 max-w-7xl mx-auto animate-fade-in">
                    <div className="grid md:grid-cols-2 gap-8">
                        <div>
                            <div className="mb-6">
                                <p className="meta-label text-accent mb-2 text-[10px]">Contact</p>
                                <h2 className="text-3xl md:text-5xl font-display uppercase leading-none">Let's Connect</h2>
                            </div>
                            <div className="space-y-4">
                                <div className="flex items-center gap-3 group cursor-pointer" onClick={copyEmail}>
                                    <div className="p-3 glass rounded-xl text-accent group-hover:bg-accent group-hover:text-black transition-all">
                                        <Icon name={copied ? "check" : "mail"} size={20} />
                                    </div>
                                    <div>
                                        <p className="text-[9px] uppercase font-bold opacity-50">Email Address</p>
                                        <p className="font-bold text-sm">{data.profile.email}</p>
                                        {copied && <p className="text-[8px] text-accent font-bold uppercase animate-pulse">Copied!</p>}
                                    </div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <div className="p-3 glass rounded-xl text-accent">
                                        <Icon name="message-square" size={20} />
                                    </div>
                                    <div>
                                        <p className="text-[9px] uppercase font-bold opacity-50">Social Presence</p>
                                        <div className="flex gap-3 mt-1.5">
                                            <a href={data.socials.github} className="hover:text-accent transition-colors p-1.5 glass rounded-lg"><Icon name="github" size={16} /></a>
                                            <a href={data.socials.linkedin} className="hover:text-accent transition-colors p-1.5 glass rounded-lg"><Icon name="linkedin" size={16} /></a>
                                            <a href={data.socials.twitter} className="hover:text-accent transition-colors p-1.5 glass rounded-lg"><Icon name="twitter" size={16} /></a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="glass p-6 rounded-2xl border-white/5">
                            <form onSubmit={handleSubmit} className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[9px] uppercase font-bold opacity-50 ml-1">Full Name</label>
                                    <input className="text-xs p-2.5" type="text" required placeholder="Gospel Eisech Chimism" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] uppercase font-bold opacity-50 ml-1">Email Address</label>
                                    <input className="text-xs p-2.5" type="email" required placeholder="hello@gospel.dev" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] uppercase font-bold opacity-50 ml-1">Your Message</label>
                                    <textarea className="text-xs p-2.5" required rows="3" placeholder="How can I help?" className="resize-none" value={formData.message} onChange={e => setFormData({...formData, message: e.target.value})} />
                                </div>
                                <button type="submit" disabled={status === 'submitting'} className="w-full py-4 bg-accent text-black font-bold uppercase tracking-widest rounded-xl text-xs hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 shadow-xl shadow-accent/20">
                                    {status === 'submitting' ? <Icon name="cpu" className="animate-spin" size={16} /> : (status === 'success' ? <Icon name="check-circle" size={16} /> : 'Send Message')}
                                </button>
                            </form>
                        </div>
                    </div>
                </section>
            );
        };

        const AdminPanel = ({ data, setData, reviews, setReviews }) => {
            const updateProfile = (field, val) => setData({ ...data, profile: { ...data.profile, [field]: val } });
            const updateSocials = (field, val) => setData({ ...data, socials: { ...data.socials, [field]: val } });
            const updateTelegram = (field, val) => setData({ ...data, telegramConfig: { ...data.telegramConfig, [field]: val } });
            
            const addProject = () => {
                const newProj = { id: Date.now().toString(), title: "New Project", description: "Description", image: "https://picsum.photos/seed/new/800/600", tags: ["Web"], link: "#" };
                setData({ ...data, projects: [...data.projects, newProj] });
            };
            const removeProject = (id) => setData({ ...data, projects: data.projects.filter(p => p.id !== id) });
            const updateProject = (id, field, val) => {
                const updated = data.projects.map(p => p.id === id ? { ...p, [field]: val } : p);
                setData({ ...data, projects: updated });
            };

            const addService = () => {
                const newService = { id: Date.now().toString(), icon: "star", title: "New Service", desc: "Service description" };
                setData({ ...data, services: [...data.services, newService] });
            };
            const removeService = (id) => setData({ ...data, services: data.services.filter(s => s.id !== id) });
            const updateService = (id, field, val) => {
                const updated = data.services.map(s => s.id === id ? { ...s, [field]: val } : s);
                setData({ ...data, services: updated });
            };

            const addChannel = () => {
                const newChannel = { id: Date.now().toString(), label: "New Channel", url: "#", icon: "link", color: "#ffffff" };
                setData({ ...data, channels: [...data.channels, newChannel] });
            };
            const removeChannel = (id) => setData({ ...data, channels: data.channels.filter(c => c.id !== id) });
            const updateChannel = (id, field, val) => {
                const updated = data.channels.map(c => c.id === id ? { ...c, [field]: val } : c);
                setData({ ...data, channels: updated });
            };

            const updateStat = (id, field, val) => {
                const updated = data.stats.map(s => s.id === id ? { ...s, [field]: val } : s);
                setData({ ...data, stats: updated });
            };

            const deleteReview = async (id) => {
                try {
                    await db.ref('reviews').child(id).remove();
                } catch (e) {
                    console.error("Error deleting review", e);
                }
            };

            const handleSave = async () => {
                try {
                    await db.ref('portfolio/main').set(data);
                    alert('All changes saved successfully to cloud!');
                } catch (e) {
                    console.error("Error saving data", e);
                    alert("Failed to save changes. Check permissions.");
                }
            };

            return (
                <section className="py-24 px-4 max-w-5xl mx-auto animate-fade-in pb-32">
                    <div className="mb-12 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <p className="meta-label text-accent mb-3">Admin Panel</p>
                            <h2 className="text-4xl md:text-6xl font-display uppercase leading-none">Control Center</h2>
                        </div>
                        <button onClick={handleSave} className="w-full sm:w-auto px-8 py-4 bg-accent text-black font-bold rounded-full text-xs uppercase tracking-widest shadow-lg shadow-accent/20">Save All Changes</button>
                    </div>

                    <div className="space-y-12">
                        {/* Profile */}
                        <div className="glass p-8 rounded-3xl space-y-6">
                            <h3 className="text-2xl font-display uppercase text-accent border-b border-white/10 pb-4">Profile & Branding</h3>
                            <div className="grid sm:grid-cols-2 gap-6">
                                <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Full Name</label><input value={data.profile.name} onChange={e => updateProfile('name', e.target.value)} /></div>
                                <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Role Title</label><input value={data.profile.role} onChange={e => updateProfile('role', e.target.value)} /></div>
                                <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Location</label><input value={data.profile.location} onChange={e => updateProfile('location', e.target.value)} /></div>
                                <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Specialization</label><input value={data.profile.specialization} onChange={e => updateProfile('specialization', e.target.value)} /></div>
                                <div className="sm:col-span-2"><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Promo / Announcement Message</label><input value={data.profile.promo} onChange={e => updateProfile('promo', e.target.value)} placeholder="Enter a fancy promo message..." /></div>
                                <div className="sm:col-span-2"><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Bio / Quick Copy Text</label><textarea value={data.profile.bio} onChange={e => updateProfile('bio', e.target.value)} rows="3" className="resize-none" /></div>
                                <div className="sm:col-span-2"><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Profile Image URL</label><input value={data.profile.image} onChange={e => updateProfile('image', e.target.value)} /></div>
                            </div>
                        </div>

                        {/* Telegram Config */}
                        <div className="glass p-8 rounded-3xl space-y-6">
                            <h3 className="text-2xl font-display uppercase text-accent border-b border-white/10 pb-4">Telegram Notifications</h3>
                            <div className="grid sm:grid-cols-2 gap-6">
                                <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Bot Token</label><input type="password" value={data.telegramConfig.botToken} onChange={e => updateTelegram('botToken', e.target.value)} placeholder="Enter Bot Token" /></div>
                                <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Chat ID</label><input value={data.telegramConfig.chatId} onChange={e => updateTelegram('chatId', e.target.value)} placeholder="Enter Chat ID" /></div>
                            </div>
                            <p className="text-[10px] text-white/40 italic">Get your bot token from @BotFather and chat ID from @userinfobot or similar.</p>
                        </div>

                        {/* Stats */}
                        <div className="glass p-8 rounded-3xl space-y-6">
                            <h3 className="text-2xl font-display uppercase text-accent border-b border-white/10 pb-4">Statistics</h3>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                {data.stats?.map(stat => (
                                    <div key={stat.id} className="space-y-2">
                                        <input className="text-center font-bold text-accent" value={stat.val} onChange={e => updateStat(stat.id, 'val', e.target.value)} />
                                        <input className="text-center text-[10px] uppercase" value={stat.label} onChange={e => updateStat(stat.id, 'label', e.target.value)} />
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Gateway Channels */}
                        <div className="glass p-8 rounded-3xl space-y-6">
                            <div className="flex justify-between items-center border-b border-white/10 pb-4">
                                <h3 className="text-2xl font-display uppercase text-accent">Gateway Channels</h3>
                                <button onClick={addChannel} className="text-accent text-xs font-bold uppercase bg-accent/10 px-4 py-2 rounded-lg">+ Add Channel</button>
                            </div>
                            <div className="grid sm:grid-cols-2 gap-6">
                                {data.channels?.map(c => (
                                    <div key={c.id} className="p-5 bg-white/5 rounded-2xl border border-white/10 relative group">
                                        <button onClick={() => removeChannel(c.id)} className="absolute top-2 right-2 text-red-500 p-2 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={16} /></button>
                                        <div className="space-y-3">
                                            <div className="grid grid-cols-2 gap-2">
                                                <div><label className="text-[8px] uppercase font-bold opacity-50">Label</label><input value={c.label} onChange={e => updateChannel(c.id, 'label', e.target.value)} /></div>
                                                <div><label className="text-[8px] uppercase font-bold opacity-50">Icon Name</label><input value={c.icon} onChange={e => updateChannel(c.id, 'icon', e.target.value)} /></div>
                                            </div>
                                            <div><label className="text-[8px] uppercase font-bold opacity-50">URL</label><input value={c.url} onChange={e => updateChannel(c.id, 'url', e.target.value)} /></div>
                                            <div><label className="text-[8px] uppercase font-bold opacity-50">Brand Color (Hex)</label><input type="color" className="h-10 p-1" value={c.color} onChange={e => updateChannel(c.id, 'color', e.target.value)} /></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Services */}
                        <div className="glass p-8 rounded-3xl space-y-6">
                            <div className="flex justify-between items-center border-b border-white/10 pb-4">
                                <h3 className="text-2xl font-display uppercase text-accent">Services</h3>
                                <button onClick={addService} className="text-accent text-xs font-bold uppercase bg-accent/10 px-4 py-2 rounded-lg">+ Add Service</button>
                            </div>
                            <div className="grid sm:grid-cols-2 gap-6">
                                {data.services?.map(s => (
                                    <div key={s.id} className="p-5 bg-white/5 rounded-2xl border border-white/10 relative group">
                                        <button onClick={() => removeService(s.id)} className="absolute top-2 right-2 text-red-500 p-2 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={16} /></button>
                                        <div className="space-y-3">
                                            <div className="grid grid-cols-2 gap-2">
                                                <div><label className="text-[8px] uppercase font-bold opacity-50">Title</label><input value={s.title} onChange={e => updateService(s.id, 'title', e.target.value)} /></div>
                                                <div><label className="text-[8px] uppercase font-bold opacity-50">Icon Name</label><input value={s.icon} onChange={e => updateService(s.id, 'icon', e.target.value)} /></div>
                                            </div>
                                            <div><label className="text-[8px] uppercase font-bold opacity-50">Description</label><textarea value={s.desc} onChange={e => updateService(s.id, 'desc', e.target.value)} rows="2" className="resize-none" /></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Projects */}
                        <div className="glass p-8 rounded-3xl space-y-6">
                            <div className="flex justify-between items-center border-b border-white/10 pb-4">
                                <h3 className="text-2xl font-display uppercase text-accent">Portfolio Projects</h3>
                                <button onClick={addProject} className="text-accent text-xs font-bold uppercase bg-accent/10 px-4 py-2 rounded-lg">+ Add Project</button>
                            </div>
                            <div className="space-y-8">
                                {data.projects?.map(p => (
                                    <div key={p.id} className="p-6 bg-white/5 rounded-2xl border border-white/10 relative group">
                                        <button onClick={() => removeProject(p.id)} className="absolute top-4 right-4 text-red-500 p-2 opacity-0 group-hover:opacity-100 transition-opacity"><Icon name="trash-2" size={18} /></button>
                                        <div className="grid sm:grid-cols-2 gap-6">
                                            <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Project Title</label><input value={p.title} onChange={e => updateProject(p.id, 'title', e.target.value)} /></div>
                                            <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Image URL</label><input value={p.image} onChange={e => updateProject(p.id, 'image', e.target.value)} /></div>
                                            <div className="sm:col-span-2"><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Description</label><textarea value={p.description} onChange={e => updateProject(p.id, 'description', e.target.value)} rows="2" className="resize-none" /></div>
                                            <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Tags (comma separated)</label><input value={p.tags?.join(', ')} onChange={e => updateProject(p.id, 'tags', e.target.value.split(',').map(t => t.trim()))} /></div>
                                            <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Project Link</label><input value={p.link} onChange={e => updateProject(p.id, 'link', e.target.value)} /></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Review Management */}
                        <div className="glass p-8 rounded-3xl space-y-6">
                            <h3 className="text-2xl font-display uppercase text-accent border-b border-white/10 pb-4">Manage Reviews</h3>
                            <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                                {reviews.map(r => (
                                    <div key={r.id} className="p-4 bg-white/5 rounded-xl border border-white/10 flex justify-between items-center">
                                        <div>
                                            <p className="text-xs font-bold text-accent uppercase">{r.project}</p>
                                            <p className="text-sm font-medium">{r.user}</p>
                                            <p className="text-xs text-white/50 italic line-clamp-1">"{r.comment}"</p>
                                        </div>
                                        <button onClick={() => deleteReview(r.id)} className="text-red-500 p-2 hover:bg-red-500/10 rounded-lg transition-colors">
                                            <Icon name="trash-2" size={16} />
                                        </button>
                                    </div>
                                ))}
                                {reviews.length === 0 && <p className="text-center text-white/30 py-8">No reviews to manage.</p>}
                            </div>
                        </div>

                        {/* Social Links */}
                        <div className="glass p-8 rounded-3xl space-y-6">
                            <h3 className="text-2xl font-display uppercase text-accent border-b border-white/10 pb-4">Social Media Handles</h3>
                            <div className="grid sm:grid-cols-3 gap-6">
                                <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Github URL</label><input value={data.socials.github} onChange={e => updateSocials('github', e.target.value)} /></div>
                                <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Linkedin URL</label><input value={data.socials.linkedin} onChange={e => updateSocials('linkedin', e.target.value)} /></div>
                                <div><label className="text-[10px] uppercase font-bold opacity-50 mb-2 block">Twitter URL</label><input value={data.socials.twitter} onChange={e => updateSocials('twitter', e.target.value)} /></div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [isAdmin, setIsAdmin] = useState(false);
            const [clickCount, setClickCount] = useState(0);
            const [data, setData] = useState(DEFAULT_DATA);
            const [reviews, setReviews] = useState([]);

            // Fetch Portfolio Data
            useEffect(() => {
                const ref = db.ref('portfolio/main');
                const onValueChange = ref.on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        const cloudData = snapshot.val();
                        setData(prev => ({
                            ...prev,
                            ...cloudData,
                            profile: { ...prev.profile, ...cloudData.profile },
                            socials: { ...prev.socials, ...cloudData.socials },
                            telegramConfig: { ...prev.telegramConfig, ...cloudData.telegramConfig }
                        }));
                    } else {
                        // Initialize with default if not exists
                        ref.set(DEFAULT_DATA);
                    }
                });
                return () => ref.off('value', onValueChange);
            }, []);

            // Fetch Reviews
            useEffect(() => {
                const ref = db.ref('reviews');
                const onValueChange = ref.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const revList = Object.keys(data).map(key => ({
                            id: key,
                            ...data[key]
                        })).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                        setReviews(revList);
                    } else {
                        setReviews([]);
                    }
                });
                return () => ref.off('value', onValueChange);
            }, []);

            const handleNameClick = () => {
                setClickCount(prev => {
                    const next = prev + 1;
                    if (next === 50) {
                        const pass = prompt("Enter Admin Password:");
                        if (pass === "gospel-admin") {
                            setIsAdmin(true);
                            setActiveTab('home');
                        } else if (pass !== null) {
                            alert("Incorrect password.");
                        }
                        return 0;
                    }
                    return next;
                });
            };

            const renderContent = () => {
                if (isAdmin) return <AdminPanel data={data} setData={setData} reviews={reviews} setReviews={setReviews} />;
                switch (activeTab) {
                    case 'home': return <Hero data={data} setActiveTab={setActiveTab} onNameClick={handleNameClick} />;
                    case 'about': return <About data={data} />;
                    case 'services': return <Services data={data} />;
                    case 'portfolio': return <Portfolio data={data} />;
                    case 'reviews': return <Reviews data={data} reviews={reviews} setReviews={setReviews} />;
                    case 'contact': return <Contact data={data} />;
                    default: return <Hero data={data} setActiveTab={setActiveTab} onNameClick={handleNameClick} />;
                }
            };

            return (
                <div className="bg-black text-white selection:bg-accent selection:text-black min-h-screen flex flex-col">
                    <Navbar activeTab={activeTab} setActiveTab={setActiveTab} isAdmin={isAdmin} setIsAdmin={setIsAdmin} />
                    <main className="flex-grow">
                        {renderContent()}
                    </main>
                    <Footer />
                </div>
            );
        };

        const Footer = () => (
            <footer className="py-8 px-4 border-t border-white/5 text-center">
                <p className="text-[8px] text-white/40 uppercase tracking-widest">© 2026 Gospel Eisech Chimism. All rights reserved.</p>
            </footer>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
